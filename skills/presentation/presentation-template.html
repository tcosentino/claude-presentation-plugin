<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{PRESENTATION_TITLE}}</title>
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #18181b;
  --bg-secondary: #27272a;
  --bg-tertiary: #3f3f46;
  --text-primary: #f4f4f5;
  --text-secondary: #a1a1aa;
  --text-muted: #71717a;
  --accent: #60a5fa;
  --accent-dim: #1e3a5f;
  --green: #4ade80;
  --yellow: #fbbf24;
  --red: #f87171;
  --blue: #60a5fa;
  --purple: #a78bfa;
  --cyan: #22d3ee;
  --orange: #fb923c;
  --border: #3f3f46;
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
  --transition-speed: 400ms;
}

body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

/* ===== Progress Bar ===== */
.progress-bar {
  position: fixed;
  top: 0;
  left: 0;
  height: 3px;
  background: var(--accent);
  transition: width 300ms ease-out;
  z-index: 100;
}

/* ===== Header ===== */
.header {
  position: fixed;
  top: 3px;
  left: 0;
  right: 0;
  padding: 12px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(24, 24, 27, 0.9);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--border);
  z-index: 50;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.section-badge {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--accent);
  background: var(--accent-dim);
  padding: 3px 10px;
  border-radius: 4px;
}

.header-title {
  font-size: 14px;
  color: var(--text-secondary);
  font-weight: 500;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 13px;
  color: var(--text-muted);
}

/* ===== Slide Container ===== */
.slide-container {
  position: fixed;
  top: 52px;
  bottom: 64px;
  left: 0;
  right: 0;
  overflow-y: auto;
  scroll-behavior: smooth;
}

.slide-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 48px 32px 80px;
}

/* ===== Slide Title ===== */
.slide-title {
  font-size: 36px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 8px;
  line-height: 1.2;
}

.slide-subtitle {
  font-size: 16px;
  color: var(--text-muted);
  margin-bottom: 40px;
  font-weight: 400;
}

/* ===== Step Blocks ===== */
.step-block {
  opacity: 0;
  transform: translateY(16px);
  transition: opacity var(--transition-speed) ease-out, transform var(--transition-speed) ease-out;
  margin-bottom: 32px;
}

.step-block.visible {
  opacity: 1;
  transform: translateY(0);
}

.step-block.instant {
  transition: none;
}

/* ===== Content Blocks ===== */

/* Text */
.content-text {
  font-size: 18px;
  line-height: 1.7;
  color: var(--text-primary);
  margin-bottom: 16px;
}

.content-text strong { color: var(--accent); font-weight: 600; }
.content-text code {
  font-family: var(--font-mono);
  font-size: 0.88em;
  background: var(--bg-secondary);
  padding: 2px 6px;
  border-radius: 4px;
  color: var(--cyan);
}

/* Heading */
.content-heading {
  font-size: 24px;
  font-weight: 600;
  color: var(--text-primary);
  margin-top: 16px;
  margin-bottom: 12px;
}

/* Code Block */
.code-block {
  background: #1e1e2e;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 16px;
}

.code-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 16px;
  background: rgba(255,255,255,0.03);
  border-bottom: 1px solid var(--border);
}

.code-filename {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-muted);
}

.code-lang {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.code-copy-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 11px;
  cursor: pointer;
  font-family: var(--font-sans);
  transition: all 150ms;
}

.code-copy-btn:hover {
  background: var(--bg-tertiary);
  color: var(--text-primary);
}

.code-body {
  padding: 16px;
  overflow-x: auto;
}

.code-body pre {
  margin: 0;
  font-family: var(--font-mono);
  font-size: 14px;
  line-height: 1.6;
  tab-size: 2;
}

.code-body code {
  font-family: inherit;
}

/* Line highlighting */
.code-line { display: block; padding: 0 4px; }
.code-line.highlighted {
  background: rgba(96, 165, 250, 0.1);
  border-left: 3px solid var(--accent);
  padding-left: 12px;
  margin-left: -4px;
}

/* Bullets */
.content-bullets {
  margin-bottom: 16px;
  padding-left: 24px;
}

.content-bullets li {
  font-size: 17px;
  line-height: 1.7;
  color: var(--text-primary);
  margin-bottom: 8px;
  padding-left: 8px;
}

.content-bullets li::marker {
  color: var(--accent);
}

.content-bullets li code {
  font-family: var(--font-mono);
  font-size: 0.88em;
  background: var(--bg-secondary);
  padding: 2px 6px;
  border-radius: 4px;
  color: var(--cyan);
}

.content-bullets li strong { color: var(--accent); font-weight: 600; }

/* Callout */
.callout {
  border-radius: 8px;
  padding: 16px 20px;
  margin-bottom: 16px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  font-size: 15px;
  line-height: 1.6;
}

.callout-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }

.callout.tip {
  background: rgba(74, 222, 128, 0.08);
  border: 1px solid rgba(74, 222, 128, 0.2);
  color: var(--green);
}

.callout.warning {
  background: rgba(251, 191, 36, 0.08);
  border: 1px solid rgba(251, 191, 36, 0.2);
  color: var(--yellow);
}

.callout.info {
  background: rgba(96, 165, 250, 0.08);
  border: 1px solid rgba(96, 165, 250, 0.2);
  color: var(--blue);
}

.callout code {
  font-family: var(--font-mono);
  font-size: 0.88em;
  background: rgba(0,0,0,0.2);
  padding: 2px 6px;
  border-radius: 4px;
}

.callout strong { font-weight: 600; }

/* Comparison */
.comparison {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
  margin-left: -60px;
  margin-right: -60px;
}

.comparison .code-body pre {
  font-size: 13px;
}

.comparison-panel {
  border-radius: 8px;
  overflow: hidden;
}

.comparison-label {
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  border-bottom: 1px solid var(--border);
}

.comparison-panel:first-child .comparison-label {
  background: rgba(248, 113, 113, 0.1);
  color: var(--red);
}

.comparison-panel:last-child .comparison-label {
  background: rgba(74, 222, 128, 0.1);
  color: var(--green);
}

/* ===== Step Dots ===== */
.step-dots {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 32px;
  padding: 12px 0;
}

.step-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--bg-tertiary);
  transition: all 200ms;
  cursor: pointer;
  border: none;
  padding: 0;
}

.step-dot.active {
  background: var(--accent);
  width: 24px;
  border-radius: 4px;
}

.step-dot.completed {
  background: var(--text-muted);
}

/* ===== Footer / Nav ===== */
.footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 12px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(24, 24, 27, 0.95);
  backdrop-filter: blur(8px);
  border-top: 1px solid var(--border);
  z-index: 50;
}

.nav-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 8px 20px;
  border-radius: 6px;
  font-size: 14px;
  cursor: pointer;
  font-family: var(--font-sans);
  transition: all 150ms;
}

.nav-btn:hover { background: var(--bg-tertiary); }
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.nav-btn:disabled:hover { background: var(--bg-secondary); }

.nav-btn kbd {
  font-family: var(--font-mono);
  font-size: 11px;
  background: var(--bg-tertiary);
  padding: 2px 6px;
  border-radius: 3px;
  color: var(--text-muted);
}

.footer-center {
  display: flex;
  align-items: center;
  gap: 16px;
}

.audio-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  width: 36px;
  height: 36px;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 150ms;
  font-size: 16px;
}

.audio-btn:hover { background: var(--bg-secondary); color: var(--text-primary); }
.audio-btn.muted { color: var(--red); }

.slide-counter {
  font-size: 13px;
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
}

/* ===== Overview Modal ===== */
.overview-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: none;
  place-items: center;
}

.overview-backdrop.open { display: grid; }

.overview-grid {
  max-width: 1100px;
  max-height: 80vh;
  overflow-y: auto;
  padding: 32px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
  width: 90vw;
}

.overview-card {
  background: var(--bg-secondary);
  border: 2px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  cursor: pointer;
  transition: all 150ms;
}

.overview-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.overview-card.current { border-color: var(--accent); }

.overview-card-section {
  font-size: 11px;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 4px;
}

.overview-card-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 4px;
}

.overview-card-steps {
  font-size: 12px;
  color: var(--text-muted);
}

.overview-close {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 201;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  color: var(--text-primary);
  width: 36px;
  height: 36px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 18px;
  display: none;
  align-items: center;
  justify-content: center;
}

.overview-backdrop.open ~ .overview-close { display: flex; }

/* ===== Title Slide ===== */
.title-slide {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  min-height: calc(100vh - 180px);
  padding: 48px 32px;
}

.title-slide .slide-title {
  font-size: 48px;
  margin-bottom: 16px;
}

.title-slide .slide-subtitle {
  font-size: 20px;
  margin-bottom: 0;
}

/* ===== Highlight.js Overrides ===== */
.code-body .hljs {
  background: transparent;
  padding: 0;
}

/* ===== Mermaid Diagrams ===== */
.mermaid-block {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 24px;
  margin: 20px 0;
  overflow-x: auto;
  display: flex;
  justify-content: center;
}
.mermaid-block .mermaid {
  min-width: 0;
  max-width: 100%;
}
.mermaid-block svg {
  max-width: 100%;
  height: auto;
}
.mermaid-error {
  color: #f88;
  font-family: var(--font-mono);
  font-size: 13px;
  white-space: pre-wrap;
}

/* ===== Scrollbar ===== */
.slide-container::-webkit-scrollbar { width: 6px; }
.slide-container::-webkit-scrollbar-track { background: transparent; }
.slide-container::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 3px; }
.slide-container::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .slide-inner { padding: 32px 20px 60px; }
  .slide-title { font-size: 28px; }
  .title-slide .slide-title { font-size: 36px; }
  .comparison { grid-template-columns: 1fr; }
  .header { padding: 10px 16px; }
  .footer { padding: 10px 16px; }
  .nav-btn kbd { display: none; }
}
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  mermaid.initialize({
    startOnLoad: false,
    theme: 'dark',
    securityLevel: 'loose',
    fontFamily: "'JetBrains Mono', 'Fira Code', monospace"
  });
  window.mermaid = mermaid;
</script>
</head>
<body>

<!-- Progress Bar -->
<div class="progress-bar" id="progressBar"></div>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <span class="section-badge" id="sectionBadge"></span>
    <span class="header-title" id="headerTitle"></span>
  </div>
  <div class="header-right">
    <span id="slidePosition"></span>
  </div>
</div>

<!-- Slide Content Area -->
<div class="slide-container" id="slideContainer">
  <div class="slide-inner" id="slideInner"></div>
</div>

<!-- Footer / Navigation -->
<div class="footer">
  <button class="nav-btn" id="prevBtn" onclick="goPrev()">
    <span>&#8592;</span> Prev <kbd>&#8592;</kbd>
  </button>
  <div class="footer-center">
    <button class="audio-btn" id="audioBtn" onclick="toggleMute()" title="Toggle audio">
      <span id="audioIcon">&#128266;</span>
    </button>
    <span class="slide-counter" id="slideCounter"></span>
  </div>
  <button class="nav-btn" id="nextBtn" onclick="goNext()">
    Next <span>&#8594;</span> <kbd>&#8594;</kbd>
  </button>
</div>

<!-- Overview Modal -->
<div class="overview-backdrop" id="overviewBackdrop" onclick="closeOverview(event)">
  <div class="overview-grid" id="overviewGrid"></div>
</div>
<button class="overview-close" id="overviewClose" onclick="toggleOverview()">&#10005;</button>

<script>
// ===== PRESENTATION DATA =====
// This gets replaced by the skill when generating a presentation
const PRESENTATION_DATA = {{PRESENTATION_DATA}};

// ===== STATE =====
let currentSlideIndex = 0;
let currentStep = 0;
let isMuted = localStorage.getItem('presentation-muted') === 'true';
let audioElement = new Audio();
let overviewOpen = false;
let allSlides = [];

// ===== INIT =====
function init() {
  // Flatten sections into ordered slide list
  allSlides = [];
  PRESENTATION_DATA.sections.forEach(section => {
    section.slides.forEach(slide => {
      allSlides.push({ ...slide, sectionTitle: section.title });
    });
  });

  // Restore position from URL hash or sessionStorage
  restorePosition();

  updateMuteUI();
  renderOverview();
  renderSlide(true);

  // Keyboard
  document.addEventListener('keydown', handleKeydown);

  // Touch
  let touchStartX = 0;
  document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
  document.addEventListener('touchend', e => {
    const diff = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(diff) > 60) {
      if (diff < 0) goNext();
      else goPrev();
    }
  });
}

function handleKeydown(e) {
  if (overviewOpen) {
    if (e.key === 'Escape') toggleOverview();
    return;
  }
  switch (e.key) {
    case 'ArrowRight':
    case 'ArrowDown':
    case ' ':
      e.preventDefault();
      goNext();
      break;
    case 'ArrowLeft':
    case 'ArrowUp':
      e.preventDefault();
      goPrev();
      break;
    case 'Home':
      e.preventDefault();
      goToSlide(0, 0);
      break;
    case 'End':
      e.preventDefault();
      goToSlide(allSlides.length - 1, allSlides[allSlides.length - 1].steps.length - 1);
      break;
    case 'Escape':
      toggleOverview();
      break;
  }
}

// ===== POSITION PERSISTENCE =====
function savePosition() {
  const hash = `${currentSlideIndex}-${currentStep}`;
  history.replaceState(null, '', '#' + hash);
  sessionStorage.setItem('presentation-position', hash);
}

function restorePosition() {
  let hash = location.hash.replace('#', '');
  if (!hash) hash = sessionStorage.getItem('presentation-position') || '';
  if (hash) {
    const parts = hash.split('-').map(Number);
    if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
      const [slide, step] = parts;
      if (slide >= 0 && slide < allSlides.length) {
        currentSlideIndex = slide;
        const maxStep = allSlides[slide].steps.length - 1;
        currentStep = Math.min(step, maxStep);
      }
    }
  }
}

// ===== NAVIGATION =====
function goNext() {
  const slide = allSlides[currentSlideIndex];
  if (currentStep < slide.steps.length - 1) {
    currentStep++;
    revealStep(currentStep);
    playStepAudio();
    updateUI();
    savePosition();
  } else if (currentSlideIndex < allSlides.length - 1) {
    currentSlideIndex++;
    currentStep = 0;
    renderSlide();
  }
}

function goPrev() {
  if (currentStep > 0) {
    currentStep--;
    renderSlide(true);
  } else if (currentSlideIndex > 0) {
    currentSlideIndex--;
    const prevSlide = allSlides[currentSlideIndex];
    currentStep = prevSlide.steps.length - 1;
    renderSlide(true);
  }
}

function goToSlide(index, step = 0) {
  currentSlideIndex = index;
  currentStep = step;
  renderSlide(true);
  if (overviewOpen) toggleOverview();
}

// ===== RENDERING =====
function renderSlide(instant = false) {
  const slide = allSlides[currentSlideIndex];
  const container = document.getElementById('slideInner');
  const slideContainer = document.getElementById('slideContainer');

  // Build HTML
  let html = '';

  // Check if this is a title-only slide (single step, single heading/text)
  const isTitleSlide = slide.steps.length === 1
    && slide.steps[0].content.length <= 2
    && slide.steps[0].content.every(c => c.kind === 'text' || c.kind === 'heading');

  if (isTitleSlide) {
    html += '<div class="title-slide">';
    html += `<h1 class="slide-title">${slide.title}</h1>`;
    if (slide.subtitle) {
      html += `<p class="slide-subtitle">${renderInlineMarkdown(slide.subtitle)}</p>`;
    }
    slide.steps[0].content.forEach(block => {
      if (block.kind === 'text') {
        html += `<p class="slide-subtitle">${renderInlineMarkdown(block.text)}</p>`;
      }
    });
    html += '</div>';
  } else {
    html += `<h1 class="slide-title">${slide.title}</h1>`;
    if (slide.subtitle) {
      html += `<p class="slide-subtitle">${renderInlineMarkdown(slide.subtitle)}</p>`;
    }

    slide.steps.forEach((step, i) => {
      const visible = i <= currentStep;
      const cls = visible ? (instant ? 'step-block visible instant' : 'step-block visible') : 'step-block';
      html += `<div class="${cls}" data-step="${i}">`;
      step.content.forEach(block => {
        html += renderContentBlock(block);
      });
      html += '</div>';
    });

    // Step dots
    if (slide.steps.length > 1) {
      html += '<div class="step-dots">';
      slide.steps.forEach((_, i) => {
        let dotClass = 'step-dot';
        if (i === currentStep) dotClass += ' active';
        else if (i < currentStep) dotClass += ' completed';
        html += `<button class="${dotClass}" onclick="goToStepDot(${i})" aria-label="Step ${i + 1}"></button>`;
      });
      html += '</div>';
    }
  }

  container.innerHTML = html;
  slideContainer.scrollTop = 0;
  renderMermaidDiagrams(container);

  // Remove instant class after render
  if (instant) {
    requestAnimationFrame(() => {
      container.querySelectorAll('.instant').forEach(el => el.classList.remove('instant'));
    });
  }

  updateUI();
  savePosition();
  playStepAudio();
}

function revealStep(stepIndex) {
  const stepEl = document.querySelector(`[data-step="${stepIndex}"]`);
  if (stepEl) {
    stepEl.classList.add('visible');
    renderMermaidDiagrams(stepEl);
    // Scroll to reveal
    setTimeout(() => {
      stepEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 50);
  }

  // Update step dots
  document.querySelectorAll('.step-dot').forEach((dot, i) => {
    dot.className = 'step-dot';
    if (i === currentStep) dot.classList.add('active');
    else if (i < currentStep) dot.classList.add('completed');
  });
}

function goToStepDot(stepIndex) {
  if (stepIndex <= currentStep) {
    currentStep = stepIndex;
    renderSlide(true);
  } else {
    // Reveal steps up to the clicked dot
    while (currentStep < stepIndex) {
      currentStep++;
      revealStep(currentStep);
    }
    playStepAudio();
    updateUI();
  }
}

function renderContentBlock(block) {
  switch (block.kind) {
    case 'text':
      return `<p class="content-text">${renderInlineMarkdown(block.text)}</p>`;

    case 'heading':
      return `<h2 class="content-heading">${renderInlineMarkdown(block.text)}</h2>`;

    case 'code':
      return renderCodeBlock(block);

    case 'mermaid':
      return renderMermaidBlock(block);

    case 'bullets':
      let items = block.items.map(item => `<li>${renderInlineMarkdown(item)}</li>`).join('');
      return `<ul class="content-bullets">${items}</ul>`;

    case 'callout':
      const icons = { tip: '&#x1f4a1;', warning: '&#9888;&#65039;', info: '&#8505;&#65039;' };
      return `<div class="callout ${block.variant}">
        <span class="callout-icon">${icons[block.variant] || icons.info}</span>
        <span>${renderInlineMarkdown(block.text)}</span>
      </div>`;

    case 'comparison':
      return `<div class="comparison">
        <div class="comparison-panel">
          <div class="comparison-label">${block.left.label}</div>
          ${renderCodeBlock({ kind: 'code', language: block.left.language || 'typescript', code: block.left.code })}
        </div>
        <div class="comparison-panel">
          <div class="comparison-label">${block.right.label}</div>
          ${renderCodeBlock({ kind: 'code', language: block.right.language || 'typescript', code: block.right.code })}
        </div>
      </div>`;

    default:
      return '';
  }
}

function renderCodeBlock(block) {
  const lang = mapLanguage(block.language || 'typescript');
  let highlighted;
  try {
    highlighted = hljs.highlight(block.code, { language: lang }).value;
  } catch (e) {
    highlighted = escapeHtml(block.code);
  }

  const lines = splitHighlightedLines(highlighted);
  const highlightSet = new Set(block.highlight || []);

  let linesHtml = lines.map((line, i) => {
    const lineNum = i + 1;
    const cls = highlightSet.has(lineNum) ? 'code-line highlighted' : 'code-line';
    return `<span class="${cls}">${line}</span>`;
  }).join('');

  let headerHtml = '';
  if (block.filename || block.language) {
    headerHtml = `<div class="code-header">
      <span class="code-filename">${block.filename || ''}</span>
      <div style="display:flex;gap:8px;align-items:center">
        <span class="code-lang">${block.language || ''}</span>
        <button class="code-copy-btn" onclick="copyCode(this)">Copy</button>
      </div>
    </div>`;
  }

  return `<div class="code-block">
    ${headerHtml}
    <div class="code-body"><pre><code class="hljs">${linesHtml}</code></pre></div>
  </div>`;
}

let mermaidIdCounter = 0;
function renderMermaidBlock(block) {
  const id = 'mermaid-' + (++mermaidIdCounter);
  return '<div class="mermaid-block"><div class="mermaid" id="' + id + '">' + escapeHtml(block.diagram || '') + '</div></div>';
}

async function renderMermaidDiagrams(root) {
  if (!window.mermaid) return;
  const scope = root || document;
  const nodes = scope.querySelectorAll('.mermaid:not([data-processed="true"])');
  for (const node of nodes) {
    const source = node.textContent;
    const id = node.id || ('mermaid-' + (++mermaidIdCounter));
    try {
      const result = await window.mermaid.render(id + '-svg', source);
      // Mermaid returns sanitized SVG from author-controlled diagram source.
      node.innerHTML = result.svg;
      if (result.bindFunctions) result.bindFunctions(node);
      node.setAttribute('data-processed', 'true');
    } catch (err) {
      node.textContent = 'Mermaid render error: ' + (err && err.message ? err.message : String(err));
      node.classList.add('mermaid-error');
      node.setAttribute('data-processed', 'true');
    }
  }
}

function copyCode(btn) {
  const code = btn.closest('.code-block').querySelector('code').textContent;
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
  });
}

// ===== INLINE MARKDOWN =====
function renderInlineMarkdown(text) {
  if (!text) return '';
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" style="color:var(--accent)" target="_blank">$1</a>');
}

// ===== SYNTAX HIGHLIGHTING (Highlight.js) =====
function mapLanguage(lang) {
  const map = {
    'py': 'python',
    'golang': 'go',
    'postgres': 'pgsql',
    'postgresql': 'pgsql',
    'sh': 'bash',
    'shell': 'bash',
    'svg': 'xml',
    'html': 'xml',
  };
  return map[lang] || lang;
}

function splitHighlightedLines(html) {
  const lines = [];
  let currentLine = '';
  let openTags = [];
  let i = 0;

  while (i < html.length) {
    if (html[i] === '\n') {
      let closers = openTags.map(() => '</span>').reverse().join('');
      lines.push(currentLine + closers);
      currentLine = openTags.join('');
      i++;
    } else if (html[i] === '<') {
      let tagEnd = html.indexOf('>', i);
      if (tagEnd === -1) { currentLine += html[i]; i++; continue; }
      let tag = html.substring(i, tagEnd + 1);
      if (tag.startsWith('</')) {
        openTags.pop();
      } else if (!tag.endsWith('/>')) {
        openTags.push(tag);
      }
      currentLine += tag;
      i = tagEnd + 1;
    } else {
      currentLine += html[i];
      i++;
    }
  }

  let closers = openTags.map(() => '</span>').reverse().join('');
  lines.push(currentLine + closers);
  return lines;
}

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

// ===== AUDIO =====
function playStepAudio() {
  if (isMuted) return;
  const slide = allSlides[currentSlideIndex];
  const step = slide.steps[currentStep];
  if (step && step.narration) {
    audioElement.pause();
    audioElement.src = 'audio/' + step.narration;
    audioElement.play().catch(() => {
      // Autoplay blocked -- ignore
    });
  }
}

function toggleMute() {
  isMuted = !isMuted;
  localStorage.setItem('presentation-muted', isMuted);
  updateMuteUI();
  if (isMuted) {
    audioElement.pause();
  } else {
    playStepAudio();
  }
}

function updateMuteUI() {
  const icon = document.getElementById('audioIcon');
  const btn = document.getElementById('audioBtn');
  if (isMuted) {
    icon.innerHTML = '&#128264;';
    btn.classList.add('muted');
  } else {
    icon.innerHTML = '&#128266;';
    btn.classList.remove('muted');
  }
}

// ===== UI UPDATES =====
function updateUI() {
  const slide = allSlides[currentSlideIndex];
  const totalSlides = allSlides.length;

  // Header
  document.getElementById('sectionBadge').textContent = slide.sectionTitle;
  document.getElementById('headerTitle').textContent = slide.title;
  document.getElementById('slidePosition').textContent = `${currentSlideIndex + 1} / ${totalSlides}`;

  // Progress bar
  const totalSteps = allSlides.reduce((sum, s) => sum + s.steps.length, 0);
  let completedSteps = 0;
  for (let i = 0; i < currentSlideIndex; i++) {
    completedSteps += allSlides[i].steps.length;
  }
  completedSteps += currentStep + 1;
  const progress = (completedSteps / totalSteps) * 100;
  document.getElementById('progressBar').style.width = progress + '%';

  // Nav buttons
  document.getElementById('prevBtn').disabled = currentSlideIndex === 0 && currentStep === 0;
  document.getElementById('nextBtn').disabled = currentSlideIndex === totalSlides - 1 && currentStep === slide.steps.length - 1;

  // Slide counter
  document.getElementById('slideCounter').textContent = `Step ${currentStep + 1} of ${slide.steps.length}`;

  // Update overview cards
  document.querySelectorAll('.overview-card').forEach((card, i) => {
    card.classList.toggle('current', i === currentSlideIndex);
  });
}

// ===== OVERVIEW =====
function renderOverview() {
  const grid = document.getElementById('overviewGrid');
  let html = '';
  allSlides.forEach((slide, i) => {
    const cls = i === currentSlideIndex ? 'overview-card current' : 'overview-card';
    html += `<div class="${cls}" onclick="goToSlide(${i})">
      <div class="overview-card-section">${slide.sectionTitle}</div>
      <div class="overview-card-title">${slide.title}</div>
      <div class="overview-card-steps">${slide.steps.length} step${slide.steps.length > 1 ? 's' : ''}</div>
    </div>`;
  });
  grid.innerHTML = html;
}

function toggleOverview() {
  overviewOpen = !overviewOpen;
  document.getElementById('overviewBackdrop').classList.toggle('open', overviewOpen);
  if (overviewOpen) renderOverview();
}

function closeOverview(e) {
  if (e.target === document.getElementById('overviewBackdrop')) {
    toggleOverview();
  }
}

// ===== START =====
init();
</script>
